name: Deploy - PRODUCTION

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Notifica inicio do deploy
        run: echo "Iniciando deploy PRODUCTION - commit ${{ github.sha }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          envs: GITHUB_SHA
          script_stop: true
          script: |
            set -euo pipefail
            SHA="${GITHUB_SHA:0:12}"
            echo "[prod] deploy commit=${SHA}"
            cd ${{ secrets.PROD_PATH }}

            PREV_IMG=$(docker inspect --format='{{.Image}}' ia-prod-api 2>/dev/null || echo "")
            echo "[prod] imagem anterior: ${PREV_IMG:-nenhuma}"

            echo "[prod] atualizando codigo..."
            git fetch origin main
            git checkout main
            git pull origin main

            echo "[prod] rodando migrations em container descartavel..."
            docker compose -f docker-compose.prod.yml run --rm \
              -e ALEMBIC_LOCK_TTL=300 \
              api sh scripts/migrate.sh

            echo "[prod] buildando novas imagens (tag=${SHA})..."
            GIT_SHA="${SHA}" BUILD_DATE="$(date -u +%Y%m%dT%H%M%SZ)" \
              docker compose -f docker-compose.prod.yml build \
                --build-arg GIT_SHA="${SHA}" \
                --build-arg BUILD_DATE="$(date -u +%Y%m%dT%H%M%SZ)"

            echo "[prod] recriando containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "[prod] aguardando healthcheck (ate 120s)..."
            HEALTHY=0
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' ia-prod-api 2>/dev/null || echo "starting")
              echo "[prod]   tentativa ${i}/24: ${STATUS}"
              if [ "${STATUS}" = "healthy" ]; then
                HEALTHY=1; break
              fi
              sleep 5
            done

            if [ "${HEALTHY}" != "1" ]; then
              echo "[prod] ERRO: healthcheck nao passou em 120s. Iniciando rollback..."
              if [ -n "${PREV_IMG}" ]; then
                docker tag "${PREV_IMG}" ia-prod-api:rollback
                docker compose -f docker-compose.prod.yml stop api
                docker run -d --name ia-prod-api-rollback --network ia-prod-net ia-prod-api:rollback
                echo "[prod] rollback para imagem anterior feito. Verifique manualmente."
              fi
              exit 1
            fi

            echo "[prod] limpando imagens antigas (mantendo 3 ultimas)..."
            docker image ls --filter "reference=ia-prod-*" --format "{{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" \
              | sort -k2 -r | awk 'NR>3 {print $1}' \
              | xargs -r docker image rm 2>/dev/null || true

            echo "[prod] Deploy concluido com sucesso."
            docker compose -f docker-compose.prod.yml ps
