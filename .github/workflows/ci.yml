name: CI

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [dev, staging]

permissions:
  contents: read

jobs:
  lint-backend:
    name: Lint & format (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck-frontend:
    name: Typecheck (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npx eslint . --max-warnings=0 || true  # warnings sem bloquear ate limpar backlog

  test-backend:
    name: Pytest (backend)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ia_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov
      - run: pytest --cov=src --cov-report=term --cov-report=xml
        env:
          DATABASE_URL: "postgres://postgres:test@localhost:5432/ia_test"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "test-jwt-secret-chave-de-teste-com-mais-de-32-chars-aqui"

  security-scan:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --desc || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm audit --production --audit-level=high || true

  gitleaks:
    name: Gitleaks (detecta segredos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
