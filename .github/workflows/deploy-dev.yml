name: Deploy - DEV

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true  # dev pode cancelar builds em andamento

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest

    steps:
      - name: Notifica inicio do deploy
        run: echo "Iniciando deploy DEV - commit ${{ github.sha }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          envs: GITHUB_SHA
          script_stop: true
          script: |
            set -euo pipefail
            SHA="${GITHUB_SHA:0:12}"
            cd ${{ secrets.DEV_PATH }}

            git fetch origin dev
            git checkout dev
            git pull origin dev

            docker compose -f docker-compose.dev.yml run --rm api sh scripts/migrate.sh
            docker compose -f docker-compose.dev.yml build \
              --build-arg GIT_SHA="${SHA}" \
              --build-arg BUILD_DATE="$(date -u +%Y%m%dT%H%M%SZ)"
            docker compose -f docker-compose.dev.yml up -d --remove-orphans

            docker image ls --filter "reference=ia-dev-*" --format "{{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" \
              | sort -k2 -r | awk 'NR>3 {print $1}' \
              | xargs -r docker image rm 2>/dev/null || true

            echo "[dev] Deploy concluido."
            docker compose -f docker-compose.dev.yml ps
