name: Deploy — DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest

    steps:
      - name: 🔔 Notifica início do deploy
        run: echo "🚀 Iniciando deploy DEV — commit ${{ github.sha }}"

      - name: 🛳️ Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "📦 Atualizando código DEV..."
            cd ${{ secrets.DEV_PATH }}

            git fetch origin dev
            git checkout dev
            git pull origin dev

            echo "🐳 Rebuild e restart dos containers DEV..."
            docker compose -f docker-compose.dev.yml pull 2>/dev/null || true
            docker compose -f docker-compose.dev.yml up --build -d

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy DEV concluído!"
            docker compose -f docker-compose.dev.yml ps
