# ─────────────────────────────────────────────
#  Ambiente: STAGING (Homologação)
#  URL:      http://staging.ia.fluxodigitaltech.com.br  (ou VPS:8082)
#  Branch:   staging
#  .env:     .env.staging
# ─────────────────────────────────────────────
name: ia-staging

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ia-staging-api
    expose:
      - "8000"
    env_file:
      - .env.staging
    environment:
      - APP_MODE=api
    restart: unless-stopped
    networks:
      - ia-staging-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ia-staging-worker
    env_file:
      - .env.staging
    environment:
      - APP_MODE=worker
    restart: unless-stopped
    networks:
      - ia-staging-net
    depends_on:
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_ENV=staging
        - API_URL=http://ia-staging-api:8000
    environment:
      - API_URL=http://ia-staging-api:8000
    container_name: ia-staging-frontend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - ia-staging-net
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: ia-staging-nginx
    ports:
      - "8082:80"       # acesso externo: http://VPS_IP:8082
    volumes:
      - ./nginx/staging.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - ia-staging-net

networks:
  ia-staging-net:
    driver: bridge
