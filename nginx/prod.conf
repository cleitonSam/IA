# [INF-01] Nginx production — TLS + security headers + rate-limit.
# Requisitos:
#   - Certificado em /etc/nginx/certs/fullchain.pem e privkey.pem
#   - (Opcional) Let's Encrypt via certbot: montar /var/www/certbot
events {
  worker_connections 1024;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"http_user_agent":"$http_user_agent",'
      '"http_x_forwarded_for":"$http_x_forwarded_for",'
      '"request_id":"$request_id"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  client_max_body_size 10M;
  client_body_timeout 15s;
  client_header_timeout 15s;
  send_timeout 15s;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  gzip on;
  gzip_vary on;
  gzip_comp_level 4;
  gzip_types application/json text/plain text/css application/javascript;

  upstream api      { server ia-prod-api:8000; keepalive 32; }
  upstream frontend { server ia-prod-frontend:3000; keepalive 32; }

  map $http_x_request_id $request_id {
    default $http_x_request_id;
    ""      $request_id_generated;
  }
  map $request_id $request_id_generated {
    default $pid-$msec-$connection;
  }

  # Redirect HTTP -> HTTPS
  server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # HTTPS principal
  server {
    listen 443 ssl http2;
    server_name ia.fluxodigitaltech.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header X-Request-ID $request_id always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://ik.imagekit.io; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self';" always;

    limit_conn conn_limit 50;
    client_max_body_size 10M;

    location /metrics {
      deny all;
      return 403;
    }

    location ~ ^/(webhook|uazapi) {
      limit_req zone=webhook_limit burst=120 nodelay;
      client_max_body_size 5M;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_read_timeout 30s;
    }

    location ~ ^/(auth/login|auth/register|auth/invite) {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location ~ ^/(api-backend/|auth|dashboard|system|health|management) {
      limit_req zone=api_limit burst=60 nodelay;
      rewrite ^/api-backend/(.*)$ /$1 break;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_read_timeout 120s;
    }

    location /ws/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
    }

    location / {
      limit_req zone=api_limit burst=100 nodelay;
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
