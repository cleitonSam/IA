# nginx — Ambiente PRODUCTION (ia-prod-api, ia-prod-frontend)
events { worker_connections 1024; }

http {
    upstream api      { server ia-prod-api:8000; }
    upstream frontend { server ia-prod-frontend:3000; }

    # Rate limit global (proteção contra bots/scraping)
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;

    server {
        listen 80;
        server_name ia.fluxodigitaltech.com.br _;

        client_max_body_size 105m;

        add_header X-Environment "production" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location ~ ^/(api-backend/|webhook|uazapi|auth|dashboard|system|metrics|health|management|ws) {
            rewrite ^/api-backend/(.*)$ /$1 break;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 105m;
            limit_req zone=global burst=20 nodelay;
        }

        location /ws/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
